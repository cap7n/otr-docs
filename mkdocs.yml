site_name: OTR Design Wiki
site_url: https://cap7n.github.io/otr-docs/
site_description: Design wiki for OTR, a 2-player co-op car game.
repo_url: https://github.com/cap7n/otr-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Co-op Design Principles: co-op-design.md
  - The Game:
      - Game Loop: game/loop.md
      - The Car: game/the-car.md
      - What Players Can Do: game/player-verbs.md
      - Weapons & Combat: game/weapons-combat.md
      - Enemies:
          - Roster & Obstacles: game/enemies.md
          - Landmarks & Bosses: game/landmark-enemies.md
      - Economy & Loot: game/economy.md
  - Systems (Plans):
      - Car Abilities: systems/car-abilities.md
      - Sound & Engine Audio: systems/audio.md
      - Music & Soundtrack: systems/soundtrack.md
      - Environmental Hazards: systems/hazards.md
      - Shortcut Paths: systems/shortcuts.md
      - Run Modifiers: systems/modifiers.md
  - Level Design:
      - World & Structure: level-design/world-structure.md
      - World & Story: level-design/world-story.md
      - Pratina: level-design/pratina.md
      - Setting & Vertical Scale: level-design/setting-and-scale.md
      - The Tunnels: level-design/tunnels.md
  - Project:
      - Backlog: project/backlog.md
      - String References Audit: project/string-references.md
      - Decision Log: project/decisions.md
      - Open Questions: project/open-questions.md
      - Roadmap: project/roadmap.md
      - Asset Pipeline: project/asset-pipeline.md
      - How to Edit This Wiki: project/how-to-edit.md
